<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNET Ledger</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;}
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        .month-banner { background: #1e293b; color: white; padding: 12px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; }
        .user-link { display: block; padding: 14px; margin: 8px 0; background: #059669; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 18px;}
        .btn { padding: 15px; background: #2563eb; color: white; border: none; border-radius: 4px; width: 100%; text-decoration: none; display: block; font-weight: bold; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        input { padding: 12px; width: 100%; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="box">
        <div style="text-align: right;"><a href="/logout" style="color: red; text-decoration: none; font-size: 10px;">LOGOUT 🔒</a></div>
        <h2>VNET Ledger</h2>
        <div class="month-banner">{{ current_month }}</div>
        <a href="/history" class="btn" style="background: #64748b;">📂 Switch Month Profile</a>
        <hr>
        {% for user in users %}<a href="/user/{{ user }}" class="user-link">{{ user }}</a>{% endfor %}
        <hr>
        <form action="/add_user" method="POST"><input type="text" name="new_username" placeholder="Add New Person" required><button type="submit" class="btn">Add User</button></form>
        <form action="/new_month" method="POST"><input type="text" name="target_month" placeholder="Create Month DB (e.g. May_2026)" required><button type="submit" class="btn" style="background: #10b981;">Start New Month</button></form>
        <a href="/admin" style="display: block; margin-top: 20px; color: #999; text-decoration: none; font-size: 12px;">Admin Dashboard</a>
    </div>
</body>
</html>
